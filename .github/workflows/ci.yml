name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit:
    name: unit tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package (with dev extras)
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"
      - name: Run unit tests
        run: python -m pytest -q

  smoke-dry-run:
    name: bwrap dry-run sanity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install bubblewrap
        run: |
          sudo apt-get update
          sudo apt-get install -y bubblewrap
      - name: Install package
        run: |
          python -m pip install -U pip
          pip install -e .
      - name: Build the bwrap command (no launch) against a fake kimi
        run: |
          set -euo pipefail
          proj="$(mktemp -d)"
          state="$(mktemp -d)"
          fake="$(mktemp -d)/kimi"
          printf '#!/bin/sh\n' > "$fake"
          chmod +x "$fake"
          # --dry-run never launches kimi; it only resolves paths and prints argv.
          out="$(kimi-sandbox "$proj" --kimi "$fake" --state-root "$state" --dry-run)"
          echo "$out"
          echo "$out" | grep -q -- "--bind $proj /workspace"
          echo "$out" | grep -q -- "--ro-bind-try /etc/resolv.conf"
          # The whole-/etc bind must NOT be present (minimal /etc only).
          if echo "$out" | grep -q -- "--ro-bind /etc /etc"; then
            echo "unexpected whole-/etc bind in dry-run output" >&2
            exit 1
          fi

  smoke:
    # Full smoke suite against real bubblewrap. Gated on manual dispatch because
    # it touches external network (the "network enabled" check) and best-effort
    # user-systemd resource limits, which are environment-dependent. The smoke
    # script auto-SKIPs the systemd-run resource-limit check when user systemd
    # is unavailable, so the resource-limit + seccomp combination is exercised
    # only on runners that actually support it.
    name: smoke (real bwrap)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install bubblewrap
        run: |
          sudo apt-get update
          sudo apt-get install -y bubblewrap
      - name: Install package
        run: |
          python -m pip install -U pip
          pip install -e .
      - name: Provide a fake kimi on PATH
        run: |
          # The smoke script resolves `kimi` from PATH but never executes it
          # (every check uses --exec or --dry-run), so a stub is sufficient.
          mkdir -p "$HOME/.local/bin"
          printf '#!/bin/sh\necho "fake kimi $*"\n' > "$HOME/.local/bin/kimi"
          chmod +x "$HOME/.local/bin/kimi"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Run smoke suite
        run: bash tests/smoke/run_smoke.sh
